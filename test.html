<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.stats-section{
    background:#f3f3f3;
    padding:40px 20px;
}

.stats-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    gap:30px;
    flex-wrap:wrap;
}

.stat-box{
    flex:1;
    min-width:200px;
}

.stat-box h2{
    font-size:48px;
    font-weight:400;
    color:#000;
    margin-bottom:10px;
}

.stat-box p{
    font-size:18px;
    color:#666;
    line-height:1.5;
}

@media(max-width:768px){

.stats-container{
    flex-direction:column;
    text-align:center;
}

.stat-box h2{
    font-size:40px;
}

}

</style>
</head>
<body>

<section class="stats-section">

    <div class="stats-container">

        <div class="stat-box">
            <h2>44%</h2>
            <p>Avg. conversion uplift</p>
        </div>

        <div class="stat-box">
            <h2>$400m+</h2>
            <p>Revenue through Charle stores</p>
        </div>

        <div class="stat-box">
            <h2>31%</h2>
            <p>Avg. organic traffic increase</p>
        </div>

        <div class="stat-box">
            <h2>29%</h2>
            <p>Avg. increase in customer LTV</p>
        </div>

    </div>

</section>

</body>
</html>
