<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Card</title>

<style>


.custom-card-wrap{
    height:300px;
    display:flex;
    align-items:flex-end;
}

.custom-service-box{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    overflow:hidden;
    cursor:pointer;
}

.custom-service-box h3{
    margin:0;
    font-size:32px;
    color:#222;
}

.custom-service-content{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:max-height .5s ease,
               opacity .4s ease,
               margin-top .4s ease;
}

.custom-service-box:hover .custom-service-content{
    max-height:150px;
    opacity:1;
    margin-top:15px;
}

.custom-service-content p{
    color:#666;
    line-height:1.7;
    font-size:16px;
}
</style>
</head>

<body>

<div class="custom-card-wrap">
    <div class="custom-service-box">
        <h3>Web Development</h3>

        <div class="custom-service-content">
            <p>
                We create modern, responsive, and high-performance
                websites tailored to your business needs.
            </p>
        </div>
    </div>
</div>

</body>
</html>
