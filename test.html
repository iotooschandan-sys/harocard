<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.cleaning_card{
    width:420px;
    background:#dbe4c9;
    border-radius:32px;
    padding:40px;
    position:relative;
    overflow:hidden;
}

/* Yellow Glow */
.cleaning_card::before{
    content:"";
    position:absolute;
    top:-50px;
    left:-50px;
    width:220px;
    height:220px;
    background:radial-gradient(circle, #ffe600 0%, rgba(255,230,0,0) 70%);
    opacity:0.9;
}

.cleaning_content{
    position:relative;
    z-index:2;
}

.cleaning_content h2{
    font-size:28px;
    line-height:1.35;
    color:#000;
    font-weight:500;
    margin-bottom:40px;
}

.contact_btn{
    display:inline-flex;
    align-items:center;
    gap:14px;
    background:#ffffff;
    padding:8px 24px 8px 8px;
    border-radius:50px;
    text-decoration:none;
}

.icon_circle{
    width:44px;
    height:44px;
    background:#ffe600;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

.contact_btn span{
    color:#000;
    font-size:18px;
    font-weight:600;
}

</style>
</head>
<body>

<div class="cleaning_card">

    <div class="cleaning_content">
        <h2>
            Looking for the cleaning<br>
            service in New York?<br>
            Contact us now!
        </h2>

        <a href="#" class="contact_btn">
            <div class="icon_circle">📞</div>
            <span>+1 (180) 567-8990</span>
        </a>
    </div>

</div>

</body>
</html>
