<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.upwork_stats_section{
    display:flex;
    gap:70px;
    align-items:flex-start;
    padding:40px;
    background:#f5f5f5;
    width:fit-content;
}

.upwork_stat_card h2{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:56px;
    font-weight:700;
    color:#111;
    margin-bottom:10px;
}

.upwork_star_icons{
    color:#f2c300;
    font-size:24px;
}

.upwork_stat_card p{
    font-size:24px;
    line-height:1.5;
    color:#111;
}

</style>
</head>
<body>

<div class="upwork_stats_section">

    <div class="upwork_stat_card">
        <h2>
            4.9
            <span class="upwork_star_icons">★★★★★</span>
        </h2>

        <p>
            Average rating of talent <br>
            from 2M+ reviews
        </p>
    </div>

    <div class="upwork_stat_card">
        <h2>8K+</h2>

        <p>
            Skills represented by talent <br>
            on Upwork.
        </p>
    </div>

</div>

</body>
</html>
